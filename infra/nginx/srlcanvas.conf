server {
  listen 80;
  listen [::]:80;
  server_name app.example.com;

  root /var/www/srlcanvas;
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  access_log /var/log/nginx/srlcanvas.access.log;
  error_log /var/log/nginx/srlcanvas.error.log warn;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location /assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /downloads/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }

  # Proxy reverso da API Fastify (obrigatorio: a SPA e buildada com
  # VITE_API_URL=/api). Sem barra final no proxy_pass: a API registra as
  # rotas COM o prefixo /api, entao o caminho deve ser repassado intacto.
  location /api/ {
    proxy_pass http://127.0.0.1:3333;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
